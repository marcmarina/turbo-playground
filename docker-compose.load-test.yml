name: load-test

services:
  express:
    build:
      context: .
      dockerfile: Dockerfile
    command: node apps/express
    ports:
      - "8080:8080"
    environment:
      - ENABLE_REQUEST_LOGGING=false
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080/_health', r => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  k6:
    image: grafana/k6
    command: run /scripts/post-user.js
    volumes:
      - ./apps/express/src/load-tests:/scripts
    environment:
      - BASE_URL=https://turbo-express.marc-lab.dev
      # - BASE_URL=http://express:8080
    depends_on:
      express:
        condition: service_healthy
